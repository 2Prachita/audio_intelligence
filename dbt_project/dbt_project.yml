name: 'audio_pipeline'
version: '1.0.0'
config-version: 2

profile: 'audio_pipeline'   # must match profiles.yml

model-paths:  ["models"]
test-paths:   ["tests"]
macro-paths:  ["macros"]
target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  audio_pipeline:
    staging:
      +schema:       staging       # → AUDIO_PIPELINE.STAGING
      +materialized: view          # staging = views (cheap, always fresh)
      +tags:         ["staging"]

    marts:
      +schema:       marts         # → AUDIO_PIPELINE.MARTS
      +materialized: table         # marts = tables (fast for queries)
      +tags:         ["marts"]
      dim_artists:
        +materialized: incremental  # SCD-2 needs incremental, not full refresh