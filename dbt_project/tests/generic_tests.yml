version: 2

models:

  - name: stg_tracks
    description: "Cleaned track records from RAW.TRACKS — supports Spotify and Last.fm sources"
    columns:
      - name: track_id
        tests:
          - not_null
          - unique
      - name: track_name
        tests:
          - not_null
      - name: artist_id
        tests:
          - not_null
      - name: duration_ms
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1000        # at least 1 second
              max_value: 7200000     # max 2 hours
      - name: play_count
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 999999999   # Last.fm play counts can be huge
              inclusive: true
              where: "play_count is not null"
      - name: popularity_score
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true
              where: "popularity_score is not null"  # NULL for Last.fm — skip
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['spotify', 'deezer', 'lastfm']  # lastfm added

  - name: stg_artists
    description: "Cleaned artist records from RAW.ARTISTS"
    columns:
      - name: artist_id
        tests:
          - not_null
          - unique
      - name: artist_name
        tests:
          - not_null

  - name: stg_audio_features
    description: "Audio features — all numeric fields are NULL for Last.fm source"
    columns:
      - name: track_id
        tests:
          - not_null
          - unique
      - name: danceability
        tests:
          - dbt_utils.accepted_range:
              min_value: 0.0
              max_value: 1.0
              inclusive: true
              where: "danceability is not null"
      - name: energy
        tests:
          - dbt_utils.accepted_range:
              min_value: 0.0
              max_value: 1.0
              inclusive: true
              where: "energy is not null"
      - name: valence
        tests:
          - dbt_utils.accepted_range:
              min_value: 0.0
              max_value: 1.0
              inclusive: true
              where: "valence is not null"

  - name: dim_artists
    description: "SCD-2 artist dimension"
    columns:
      - name: artist_surrogate_key
        tests:
          - not_null
          - unique
      - name: artist_id
        tests:
          - not_null
      - name: artist_name
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: valid_from
        tests:
          - not_null

  - name: fct_audio_features
    description: "Core fact table — one row per track"
    columns:
      - name: track_id
        tests:
          - not_null
      - name: artist_id
        tests:
          - not_null
      - name: track_name
        tests:
          - not_null
      - name: run_date
        tests:
          - not_null

  - name: mart_audio_trends
    description: "Pre-aggregated analytics mart"
    columns:
      - name: agg_type
        tests:
          - not_null
          - accepted_values:
              values: ['genre_profile', 'era_trends', 'top_artists', 'tempo_dist']
      - name: dimension_value
        tests:
          - not_null